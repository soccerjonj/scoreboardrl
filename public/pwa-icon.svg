<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1524"/>
      <stop offset="100%" stop-color="#080e1a"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="primaryV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Atmospheric glows -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#glow1)"/>
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#glow2)"/>

  <!-- Left accent bar -->
  <rect x="96" y="200" width="18" height="400" rx="9" fill="url(#primaryV)"/>

  <!-- SCORE text -->
  <text
    x="148"
    y="424"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="168"
    letter-spacing="-6"
    fill="#ffffff"
  >SCORE</text>

  <!-- BOARD text (slightly dimmed) -->
  <text
    x="148"
    y="596"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="168"
    letter-spacing="-6"
    fill="#ffffff"
    opacity="0.75"
  >BOARD</text>

  <!-- Gradient underline -->
  <rect x="148" y="626" width="620" height="16" rx="8" fill="url(#primary)"/>

  <!-- RL badge -->
  <rect x="726" y="680" width="208" height="208" rx="40" fill="#3b82f6" fill-opacity="0.12"/>
  <rect x="726" y="680" width="208" height="208" rx="40" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-opacity="0.4"/>
  <text
    x="830"
    y="832"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="122"
    text-anchor="middle"
    fill="url(#primary)"
  >RL</text>

  <!-- Speed lines -->
  <line x1="148" y1="668" x2="390" y2="668" stroke="#3b82f6" stroke-width="5" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="148" y1="694" x2="290" y2="694" stroke="#3b82f6" stroke-width="4" stroke-opacity="0.18" stroke-linecap="round"/>
</svg>
