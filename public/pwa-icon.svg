<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <ellipse cx="512" cy="0" rx="500" ry="220" fill="#22c55e" opacity="0.07"/>

  <!-- Left green accent bar -->
  <rect x="88" y="210" width="16" height="360" rx="8" fill="url(#accent)"/>

  <!-- SCORE -->
  <text
    x="136"
    y="400"
    font-family="'Arial Black', Impact, sans-serif"
    font-weight="900"
    font-size="156"
    letter-spacing="-4"
    fill="#ffffff"
  >SCORE</text>

  <!-- BOARD (slightly dimmed) -->
  <text
    x="136"
    y="558"
    font-family="'Arial Black', Impact, sans-serif"
    font-weight="900"
    font-size="156"
    letter-spacing="-4"
    fill="#ffffff"
    opacity="0.80"
  >BOARD</text>

  <!-- Green underline -->
  <rect x="136" y="586" width="580" height="18" rx="9" fill="url(#accent)"/>

  <!-- RL badge -->
  <rect x="716" y="634" width="220" height="220" rx="36" fill="#22c55e" opacity="0.10"/>
  <rect x="716" y="634" width="220" height="220" rx="36" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.35"/>
  <text
    x="826"
    y="790"
    font-family="'Arial Black', Impact, sans-serif"
    font-weight="900"
    font-size="126"
    text-anchor="middle"
    fill="#22c55e"
  >RL</text>

  <!-- Subtle speed lines -->
  <line x1="136" y1="628" x2="360" y2="628" stroke="#22c55e" stroke-width="5" opacity="0.25" stroke-linecap="round"/>
  <line x1="136" y1="656" x2="270" y2="656" stroke="#22c55e" stroke-width="5" opacity="0.15" stroke-linecap="round"/>
</svg>
